services:
  postgres:
    image: postgres:15
    container_name: desafio-first-decision
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-desafiodb}
      POSTGRES_USER: ${POSTGRES_USER:-dev_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
