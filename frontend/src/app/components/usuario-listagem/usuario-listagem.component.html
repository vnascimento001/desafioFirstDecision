<div class="cabecalho-listagem">
  <h2>{{ labels.titulo }}</h2>

  <div class="busca">
    <mat-form-field appearance="outline" class="busca-campo" subscriptSizing="dynamic">
      <mat-label>{{ labels.buscaLabel }}</mat-label>
      <input
        matInput
        type="text"
        [(ngModel)]="busca"
        [placeholder]="labels.buscaPlaceholder"
        (keyup.enter)="pesquisar()" />
    </mat-form-field>

    <div class="busca-acoes">
      <button mat-flat-button color="primary" type="button" (click)="pesquisar()">{{ labels.botaoPesquisar }}</button>
      <button mat-stroked-button color="primary" type="button" (click)="limparBusca()">{{ labels.botaoLimparBusca }}</button>
    </div>
  </div>
</div>

<p class="erro" *ngIf="mensagemErro">{{ mensagemErro }}</p>

<div class="tabela-wrapper">
  <table
    mat-table
    [dataSource]="usuarios"
    matSort
    [matSortActive]="campoOrdenacao"
    [matSortDirection]="direcaoOrdenacao"
    (matSortChange)="mudouOrdenacao($event)"
    matSortDisableClear>
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef mat-sort-header="nome">{{ labels.colunaNome }}</th>
      <td mat-cell *matCellDef="let usuario">{{ usuario.nome }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef mat-sort-header="email">{{ labels.colunaEmail }}</th>
      <td mat-cell *matCellDef="let usuario">{{ usuario.email }}</td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef>{{ labels.colunaAcoes }}</th>
      <td mat-cell *matCellDef="let usuario">
        <div class="acoes">
          <button mat-stroked-button color="primary" type="button" (click)="editar(usuario)">{{ labels.botaoEditar }}</button>
          <button mat-flat-button color="warn" type="button" (click)="deletar(usuario.id)">{{ labels.botaoDeletar }}</button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas"></tr>
  </table>

  <div class="carregando" *ngIf="carregando">
    <mat-spinner diameter="32"></mat-spinner>
  </div>
</div>

<p *ngIf="!carregando && usuarios.length === 0">{{ labels.nenhumCadastro }}</p>

<mat-paginator
  [length]="totalElementos"
  [pageSize]="tamanhoPagina"
  [pageIndex]="paginaAtual"
  [hidePageSize]="true"
  (page)="mudouPaginacao($event)">
</mat-paginator>
